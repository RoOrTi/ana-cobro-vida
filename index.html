<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduFlow - Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
    <script>
        function updatePortalTime() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
            const dateStr = now.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

            const timeEl = document.getElementById('portal-time');
            const dateEl = document.getElementById('portal-date');
            if (timeEl) timeEl.innerText = timeStr;
            if (dateEl) dateEl.innerText = dateStr.charAt(0).toUpperCase() + dateStr.slice(1);
        }
        setInterval(updatePortalTime, 1000);
        window.onload = updatePortalTime;
    </script>
</head>

<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">
    <div class="max-w-md w-full bg-white rounded-3xl shadow-2xl overflow-hidden p-8 text-center">
        <div class="flex justify-between items-center mb-6 px-1">
            <div id="portal-date" class="text-[10px] font-bold text-gray-400 uppercase tracking-tighter">Cargando
                fecha...</div>
            <div id="portal-time" class="text-[10px] font-extrabold text-blue-600 bg-blue-50 px-2 py-0.5 rounded-full">
                --:--</div>
        </div>
        <div class="w-20 h-20 bg-blue-100 rounded-2xl flex items-center justify-center mx-auto mb-6">

                </path>

        </div>

                        <path

                            stroke-width="2"></path>

<script src="/assistant-brain.js"></script>
<script src="/assistant-core.js"></script>

</body>

</html>
