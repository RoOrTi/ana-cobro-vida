<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ana — Asistente Virtual Premium</title>
    <link href="/ana-theme.css" rel="stylesheet">
</head>

<body class="ana-premium">

    <!-- INTRO SCREEN -->
    <div class="intro-overlay" id="intro">
        <div class="intro-logo">ANA</div>
        <div class="intro-subtitle">Asistente Virtual Inteligente</div>
        <div class="intro-loader">
            <div class="intro-loader-bar"></div>
        </div>
    </div>

    <div class="bg-canvas"></div>
    <div class="bg-grid"></div>

    <div class="app-layout">
        <!-- LEFT: AVATAR PANEL -->
        <div class="avatar-panel">
            <div class="brand">
                <div class="brand-name">Ana</div>
                <div class="brand-sub">Virtual Assistant</div>
            </div>

            <!-- This is where AnaCharacter will render -->
            <div id="avatarWrap"></div>

            <div class="status-bar">
                <div class="status-dot"></div>
                <div class="status-text">En línea</div>
            </div>
            <div class="mood-display">Lista para ayudarte ✨</div>
        </div>

        <!-- RIGHT: CHAT PANEL -->
        <div class="chat-panel">
            <div class="chat-header">
                <div class="chat-title">Chat con <span>Ana</span></div>
            </div>

            <div class="messages-wrap" id="messagesWrap">
                <!-- Messages will appear here -->
            </div>

            <div class="typing-indicator" id="typingIndicator">
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            </div>

            <div class="input-area">
                <div class="input-wrap">
                    <textarea id="chat-input" rows="1" placeholder="Escribe un mensaje a Ana..."></textarea>
                    <div class="input-actions">
                        <button class="btn-mic" id="micBtn">🎤</button>
                        <button class="btn-send">➤</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/ana-character.js"></script>
    <script src="/assistant-brain.js"></script>
    <script src="/assistant-core.js"></script>

    <script>
        // Simple intro screen handle
        window.addEventListener('load', () => {
            setTimeout(() => {
                const intro = document.getElementById('intro');
                if (intro) {
                    intro.style.opacity = '0';
                    setTimeout(() => intro.remove(), 800);
                }
            }, 2000);
        });
    </script>

    <style>
        /* Additional inline styles for the layout structure from user code */
        body {
            margin: 0;
            overflow: hidden;
            height: 100vh;
            display: flex;
            position: relative;
        }

        .bg-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: radial-gradient(ellipse 80% 60% at 30% 50%, rgba(155, 127, 232, 0.08) 0%, transparent 60%), #0a0a0f;
        }

        .bg-grid {
            position: fixed;
            inset: 0;
            z-index: 0;
            opacity: 0.03;
            background-image: linear-gradient(rgba(255, 255, 255, 1) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 1) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        .app-layout {
            position: relative;
            z-index: 1;
            display: flex;
            width: 100%;
            height: 100vh;
        }

        .avatar-panel {
            width: 420px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 30px;
            border-right: 1px solid rgba(255, 255, 255, 0.07);
            background: linear-gradient(180deg, rgba(16, 16, 28, 0.9) 0%, rgba(10, 10, 20, 0.95) 100%);
        }

        .chat-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: relative;
            background: rgba(10, 10, 15, 0.5);
        }

        .chat-header {
            padding: 24px 32px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(10px);
        }

        .chat-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 20px;
            color: #e8e8f0;
            letter-spacing: 2px;
        }

        .chat-title span {
            color: #c9a96e;
        }

        .messages-wrap {
            flex: 1;
            overflow-y: auto;
            padding: 32px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scrollbar-width: thin;
        }

        .input-area {
            padding: 20px 32px 28px;
            border-top: 1px solid rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(10px);
        }

        .input-wrap {
            display: flex;
            align-items: flex-end;
            gap: 12px;
            background: #16161f;
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 20px;
            padding: 10px 10px 10px 20px;
        }

        #chat-input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: #e8e8f0;
            font-size: 14px;
            resize: none;
            max-height: 120px;
        }

        .btn-send {
            width: 42px;
            height: 42px;
            border-radius: 14px;
            border: none;
            background: linear-gradient(135deg, #c9a96e, #b8860b);
            color: #1a1000;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-mic {
            width: 42px;
            height: 42px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.07);
            background: #111118;
            color: #7070a0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-mic.recording {
            background: rgba(232, 127, 163, 0.15);
            border-color: #e87fa3;
            color: #e87fa3;
            animation: mic-pulse 1s infinite;
        }

        @keyframes mic-pulse {

            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(232, 127, 163, 0.4);
            }

            50% {
                box-shadow: 0 0 0 8px rgba(232, 127, 163, 0);
            }
        }

        .brand {
            position: absolute;
            top: 30px;
            text-align: center;
        }

        .brand-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 28px;
            letter-spacing: 8px;
            color: #e8d5a3;
            text-transform: uppercase;
        }

        .brand-sub {
            font-size: 10px;
            letter-spacing: 4px;
            color: #7070a0;
            margin-top: 4px;
        }

        .status-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4ade80;
            box-shadow: 0 0 8px #4ade80;
        }

        .status-text {
            font-size: 12px;
            letter-spacing: 2px;
            color: #7070a0;
            text-transform: uppercase;
        }

        .mood-display {
            font-family: 'Cormorant Garamond', serif;
            color: #c9a96e;
            margin-top: 12px;
            font-style: italic;
        }

        .typing-indicator {
            display: none;
            gap: 5px;
            margin-bottom: 20px;
        }

        .typing-indicator.visible {
            display: flex;
        }

        .typing-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #c9a96e;
            animation: typing-bounce 1.2s infinite;
        }

        @keyframes typing-bounce {

            0%,
            60%,
            100% {
                transform: translateY(0);
                opacity: 0.3;
            }

            30% {
                transform: translateY(-8px);
                opacity: 1;
            }
        }

        .intro-overlay {
            position: fixed;
            inset: 0;
            z-index: 200;
            background: #0a0a0f;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s;
        }

        .intro-logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 72px;
            color: #c9a96e;
            letter-spacing: 12px;
        }

        .intro-loader {
            width: 160px;
            height: 2px;
            background: #16161f;
            margin-top: 48px;
        }

        .intro-loader-bar {
            height: 100%;
            background: #c9a96e;
            width: 0%;
            animation: loader-fill 1.5s forwards;
        }

        @keyframes loader-fill {
            to {
                width: 100%;
            }
        }
    </style>
</body>

</html>
