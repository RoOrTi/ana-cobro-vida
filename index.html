<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ana — Asistente Virtual Premium</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Ana AI">
    <meta name="theme-color" content="#04060f">
    <link href="./ana-theme.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="ana-premium">

    <!-- INTRO SCREEN -->
    <div class="intro-overlay" id="intro">
        <div class="intro-logo">ANA</div>
        <div class="intro-subtitle">Asistente Virtual Inteligente</div>
        <div class="intro-loader" id="introLoader">
            <div class="intro-loader-bar"></div>
        </div>
        <button id="startBtn"
            style="display:none; margin-top:40px; background:var(--ana-gold); border:none; padding:12px 40px; border-radius:50px; font-weight:bold; cursor:pointer; color:black;">ENTRAR</button>
    </div>

    <div class="bg-canvas"></div>
    <div class="bg-grid"></div>

    <div class="app-layout">
        <!-- LEFT: MINI NAV SIDEBAR -->
        <div class="nav-sidebar">
            <div class="nav-logo">
                <div class="logo-orb"></div>
            </div>
            <div class="nav-items">
                <div class="nav-item active" title="Chat">
                    <span class="icon">💬</span>
                </div>
                <div class="nav-item" title="Mercados">
                    <span class="icon">📈</span>
                </div>
                <div class="nav-item" title="Cartera">
                    <span class="icon">💼</span>
                </div>
                <div class="nav-item" title="Ajustes">
                    <span class="icon">⚙️</span>
                </div>
            </div>

            <!-- AGENDA MINI SECTION -->
            <div class="sidebar-agenda">
                <div class="agenda-title">AGENDA</div>
                <div id="agendaList" class="agenda-list">
                    <!-- Tasks will appear here -->
                </div>
            </div>

            <div class="nav-footer">
                <div class="user-avatar"></div>
            </div>
        </div>

        <!-- CENTER: AVATAR PANEL -->
        <div class="avatar-panel">
            <div id="avatarWrap" class="full-body-mode"></div>
        </div>

        <!-- RIGHT: CHAT PANEL -->
        <div class="chat-panel">
            <div class="chat-header">
                <div class="chat-title">Sesión de Análisis con <span>Ana</span></div>
                <div class="chat-meta">Market Intelligence v2.0</div>
                <div id="marketTicker" class="market-ticker">
                    <!-- Mercado en vivo aparecerá aquí -->
                    Conectando con mercados...
                </div>
            </div>

            <div class="messages-container">
                <div class="messages-wrap" id="messagesWrap">
                    <!-- Messages will appear here -->
                </div>
            </div>

            <div class="suggestions-container" id="suggestionsContainer">
                <!-- Suggested questions will appear here -->
            </div>

            <div class="input-area">
                <div class="input-wrap">
                    <textarea id="chat-input" rows="1"
                        placeholder="Consulta sobre activos, tendencias o tu cartera..."></textarea>
                    <div class="input-actions">
                        <button class="btn-mic" id="micBtn" title="Voz">🎤</button>
                        <button class="btn-send" title="Enviar">➤</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="./ana-character.js"></script>
    <script src="./financial-charts.js"></script>
    <script src="./assistant-brain.js"></script>
    <script src="./assistant-core.js"></script>

    <script>
        window.addEventListener('load', () => {
            const intro = document.getElementById('intro');
            const loader = document.getElementById('introLoader');
            const startBtn = document.getElementById('startBtn');

            // Simular carga
            setTimeout(() => {
                if (loader) loader.style.display = 'none';
                if (startBtn) startBtn.style.display = 'block';
            }, 1500);

            startBtn.addEventListener('click', () => {
                // Desbloquear audio para iOS/Safari
                if (window.speechSynthesis) {
                    const utterance = new SpeechSynthesisUtterance('');
                    window.speechSynthesis.speak(utterance);
                }

                if (intro) {
                    intro.style.opacity = '0';
                    setTimeout(() => intro.remove(), 800);
                }
            });
        });
    </script>
</body>

</html>
