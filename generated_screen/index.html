<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>Asistente: Éxito</title>
<!-- BEGIN: Tailwind CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- END: Tailwind CDN -->
<!-- BEGIN: Theme Configuration -->
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#206fee',
          },
          borderRadius: {
            'custom': '8px',
          },
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui'],
          }
        }
      }
    }
  </script>
<!-- END: Theme Configuration -->
<style data-purpose="custom-layout">
    /* Ensure the mobile screen fills the viewport */
    body, html {
      height: 100%;
      margin: 0;
      overflow: hidden;
      background-color: #f9fafb;
    }
    .safe-area-bottom {
      padding-bottom: env(safe-area-inset-bottom);
    }
    /* Blur effect for the floating card background */
    .glass-card {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
  </style>
</head>
<body class="flex flex-col font-sans text-gray-900">
<!-- BEGIN: MainHeader -->
<header class="bg-white border-b border-gray-100 py-3 px-4 flex items-center justify-between z-10">
<div class="flex items-center gap-2">
<div class="w-2 h-2 rounded-full bg-green-500"></div>
<h1 class="text-lg font-bold text-gray-800">Asistente: Éxito</h1>
</div>
<button class="p-2 text-gray-500">
<svg fill="none" height="20" stroke="currentColor" viewbox="0 0 24 24" width="20" xmlns="http://www.w3.org/2000/svg">
<path d="M12 5v.01M12 12v.01M12 19v.01M12 6a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
</header>
<!-- END: MainHeader -->
<!-- BEGIN: AssistantView -->
<main class="flex-1 relative flex flex-col overflow-hidden bg-white">
<!-- Assistant Image Container -->
<div class="absolute inset-0 flex justify-center items-end overflow-hidden" data-purpose="assistant-background">
<img alt="Asistente sonriente dando ánimos" class="h-full w-auto object-contain object-bottom" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCDXnEafO0CXiLP9godWdz5J6ntWDVbYsiWTGToyfxezebA-wytJO3LcUNgaW_dlhz7vigCQ9yTlgVdK3f_tfpj2oWfZCk7nfDjFCRvWFPY-bbyU-EXmh3q5HkhiTBbQRzjT0-g8D7KyXhZUwistqB93gR3im3wcUMocGvIe4FZ3msiDnRov5JRkD9Yc1AmKh_NELj1gLH4PRUe2vE_dyGVlhQaFq20L_0zfATUFsHGqi4C_f0H-7_zLEPwsoc3PXBKe2oOJp6dVA"/>
</div>
<!-- Floating Success Card -->
<!-- Positioned to the left as requested, ensuring it doesn't fully obscure the torso -->
<div class="absolute top-1/4 left-4 w-2/3 max-w-[240px] z-20" data-purpose="congratulations-vignette">
<div class="glass-card p-5 rounded-custom shadow-xl border border-white/50">
<h2 class="text-primary font-bold text-xl mb-2">¡Excelente trabajo!</h2>
<p class="text-sm text-gray-700 mb-4 leading-relaxed">
          Has completado la lección con éxito.
        </p>
<button class="w-full bg-primary text-white font-semibold py-3 rounded-custom shadow-md hover:bg-blue-700 transition-colors">
          Continuar
        </button>
</div>
</div>
</main>
<!-- END: AssistantView -->
<!-- BEGIN: ChatInterface -->
<section class="bg-white border-t border-gray-200 px-4 py-3" data-purpose="message-input-area">
<div class="flex items-center gap-3">
<!-- Microphone Icon -->
<button aria-label="Hablar" class="w-10 h-10 flex items-center justify-center text-gray-500 bg-gray-100 rounded-full">
<svg fill="none" height="22" stroke="currentColor" viewbox="0 0 24 24" width="22" xmlns="http://www.w3.org/2000/svg">
<path d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
<!-- Text Input -->
<div class="flex-1">
<input class="w-full border-none bg-gray-100 rounded-custom px-4 py-2 text-sm focus:ring-2 focus:ring-primary focus:bg-white transition-all" placeholder="Escribe un mensaje..." type="text"/>
</div>
<!-- Send Button -->
<button aria-label="Enviar" class="w-10 h-10 flex items-center justify-center bg-primary text-white rounded-full shadow-sm">
<svg class="transform rotate-90" fill="none" height="20" stroke="currentColor" viewbox="0 0 24 24" width="20" xmlns="http://www.w3.org/2000/svg">
<path d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
</div>
</section>
<!-- END: ChatInterface -->
<!-- BEGIN: BottomNavigation -->
<nav class="bg-white border-t border-gray-100 px-6 pt-2 pb-4 safe-area-bottom" data-purpose="main-navigation">
<div class="flex justify-between items-center">
<!-- Chat (Active) -->
<a class="flex flex-col items-center gap-1 group" href="#">
<div class="p-1 text-primary">
<svg fill="currentColor" height="24" viewbox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg">
<path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"></path>
</svg>
</div>
<span class="text-[10px] font-bold text-primary uppercase tracking-wider">Chat</span>
</a>
<!-- Historial -->
<a class="flex flex-col items-center gap-1 group" href="#">
<div class="p-1 text-gray-400 group-hover:text-primary transition-colors">
<svg fill="none" height="24" stroke="currentColor" viewbox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<span class="text-[10px] font-medium text-gray-400 uppercase tracking-wider">Historial</span>
</a>
<!-- Perfil -->
<a class="flex flex-col items-center gap-1 group" href="#">
<div class="p-1 text-gray-400 group-hover:text-primary transition-colors">
<svg fill="none" height="24" stroke="currentColor" viewbox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg">
<path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<span class="text-[10px] font-medium text-gray-400 uppercase tracking-wider">Perfil</span>
</a>
<!-- Ajustes -->
<a class="flex flex-col items-center gap-1 group" href="#">
<div class="p-1 text-gray-400 group-hover:text-primary transition-colors">
<svg fill="none" height="24" stroke="currentColor" viewbox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg">
<path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
<path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<span class="text-[10px] font-medium text-gray-400 uppercase tracking-wider">Ajustes</span>
</a>
</div>
</nav>
<!-- END: BottomNavigation -->

<script src="/assistant-brain.js"></script>
<script src="/assistant-core.js"></script>
<script src="/navigation.js"></script>
</body></html>
