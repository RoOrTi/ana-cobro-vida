<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>EduFlow - ¡Hasta pronto!</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#206fee",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101722",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .speech-bubble::after {
            content: '';
            position: absolute;
            left: -12px;
            top: 50%;
            transform: translateY(-50%);
            border-width: 8px 12px 8px 0;
            border-style: solid;
            border-color: transparent white transparent transparent;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen flex flex-col">
<!-- Header / Navigation -->
<nav class="flex items-center bg-white dark:bg-slate-900 p-4 border-b border-slate-200 dark:border-slate-800 justify-between sticky top-0 z-10">
<div class="text-slate-900 dark:text-slate-100 flex size-10 items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 cursor-pointer transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-10">EduFlow</h2>
</nav>
<!-- Main Content Area -->
<main class="flex-1 flex flex-col items-center justify-center p-6 relative max-w-4xl mx-auto w-full">
<div class="grid grid-cols-1 md:grid-cols-2 gap-8 items-center w-full">
<!-- 3D Character Container -->
<div class="relative order-2 md:order-1 flex justify-center items-end min-h-[400px]">
<!-- Studio Background Glow -->
<div class="absolute inset-0 bg-primary/5 rounded-full blur-3xl -z-10"></div>
<div class="relative w-full max-w-xs md:max-w-sm aspect-[3/4] rounded-2xl overflow-hidden bg-gradient-to-b from-white to-slate-50 dark:from-slate-800 dark:to-slate-900 shadow-xl border border-white/20">
<img alt="Asistente virtual rubia con vestimenta profesional sonriendo y saludando" class="w-full h-full object-cover object-top" data-alt="Asistente virtual profesional rubia saludando amablemente" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAOwweNd4wivOBsAkIsbwlR4y6lZ3q22fi6qDr_3msS4mhQY18wBnOGALLbVhTVEp-lHfWo-BchLXpz7TI9kGvrszSO-ay810mwm0n-TxTmVR7ehz7GWwNxoAEuNbIaDhfPh2zVAzIx4qTBLU72H8AFOe6bQaKLoeJVRaWONHSjBiDLIlHIHemZ8iH6-bJ7KHf4dY5KW2GSGfRntFcePdc0H9AEsMoZyK9XJTU1XYfksHuU15vkrcPGh4c8aO4wlh_adedhfzoxiw"/>
</div>
</div>
<!-- Speech Content -->
<div class="order-1 md:order-2 flex flex-col items-center md:items-start text-center md:text-left space-y-6">
<div class="relative speech-bubble bg-white dark:bg-slate-800 p-8 rounded-2xl shadow-lg border border-slate-100 dark:border-slate-700 max-w-md">
<h1 class="text-slate-900 dark:text-slate-100 text-3xl font-bold mb-4">¡Hasta pronto!</h1>
<p class="text-slate-600 dark:text-slate-300 text-lg leading-relaxed">
                        Espero que hayas disfrutado la lección de hoy. ¡Vuelve cuando quieras seguir aprendiendo! Estamos aquí para ayudarte a crecer.
                    </p>
</div>
<!-- Secondary Consistent Button -->
<button class="flex items-center gap-2 text-primary font-semibold py-2 px-4 rounded-lg hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined">play_circle</span>
<span>Animar respuesta</span>
</button>
</div>
</div>
</main>
<!-- Bottom Actions -->
<footer class="bg-white dark:bg-slate-900 p-6 border-t border-slate-200 dark:border-slate-800">
<div class="max-w-md mx-auto space-y-3">
<button class="w-full bg-primary text-white font-bold py-4 px-8 rounded-xl shadow-lg shadow-primary/20 hover:bg-primary/90 transition-all active:scale-[0.98]">
                Finalizar sesión
            </button>
</div>
</footer>
<!-- Navigation Bar Component -->
<div class="flex gap-2 border-t border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 px-4 pb-4 pt-2">
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined">home</span>
</div>
<p class="text-[10px] font-medium leading-normal uppercase tracking-wider">Inicio</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-primary" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">menu_book</span>
</div>
<p class="text-[10px] font-medium leading-normal uppercase tracking-wider">Lecciones</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined">bar_chart</span>
</div>
<p class="text-[10px] font-medium leading-normal uppercase tracking-wider">Progreso</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined">person</span>
</div>
<p class="text-[10px] font-medium leading-normal uppercase tracking-wider">Perfil</p>
</a>
</div>

<script src="/assistant-brain.js"></script>
<script src="/assistant-core.js"></script>
<script src="/navigation.js"></script>
</body></html>
